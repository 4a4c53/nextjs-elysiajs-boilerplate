name: ${npm_package_name}_dev

services:
  postgres:
    container_name: ${npm_package_name}_postgres
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=${npm_package_config_postgres_db}
      - POSTGRES_USER=${npm_package_config_postgres_user}
      - POSTGRES_PASSWORD=${npm_package_config_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${npm_package_config_postgres_user} -d ${npm_package_config_postgres_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: ${npm_package_name}_postgres_data
    driver: local